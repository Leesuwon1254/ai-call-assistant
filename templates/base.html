<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI 통화비서{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
      <i class="bi bi-telephone-fill me-2"></i>AI 통화비서
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
             href="{{ url_for('index') }}">
            <i class="bi bi-house me-1"></i>홈
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'upload' %}active{% endif %}"
             href="{{ url_for('upload') }}">
            <i class="bi bi-upload me-1"></i>통화 분석
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'customers' %}active{% endif %}"
             href="{{ url_for('customers') }}">
            <i class="bi bi-people me-1"></i>고객관리
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 플래시 메시지 -->
<div class="container mt-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</div>

<!-- 메인 콘텐츠 -->
<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<!-- 푸터 -->
<footer class="bg-light border-top mt-5 py-3">
  <div class="container text-center text-muted small">
    <i class="bi bi-telephone-fill me-1 text-primary"></i>AI 통화비서 &copy; 2025
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
